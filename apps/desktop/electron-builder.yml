appId: com.peep.desktop
productName: Peep
directories:
  output: release
files:
  - out/**/*
publish:
  provider: github
  owner: ahmedalouzi
  repo: peep
win:
  target: nsis
  icon: resources/icons/icon.ico
  # Add Authenticode signing configurations here when cert is ready:
  # certificateFile: "build/certs/win_cert.pfx"
  # certificatePassword: "WIN_CERT_PASSWORD"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: resources/icons/icon.icns
  # Add Apple Developer ID code signing & notarization configurations here:
  # identity: "Developer ID Application: Your Name (TeamID)"
  # entitlements: "build/entitlements.mac.plist"
  # entitlementsInherit: "build/entitlements.mac.plist"
  # gatekeeperAssess: false
  # hardentedRuntime: true
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

